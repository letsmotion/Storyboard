name: Build and Release

on:
  push:
    tags:
      - 'v*'  # 当推送 v* 标签时触发（如 v1.0.0）

jobs:
  build-and-release:
    runs-on: windows-latest

    permissions:
      contents: write  # 需要写权限来创建 Release

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install Velopack
      run: dotnet tool install -g vpk

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Publish
      run: dotnet publish --configuration Release --runtime win-x64 --output ./publish --no-build

    - name: Get version from tag
      id: get_version
      run: |
        $version = "${{ github.ref_name }}".TrimStart('v')
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        echo "发布版本: $version"
      shell: pwsh

    - name: Package with Velopack
      run: |
        vpk pack `
          --packId Storyboard `
          --packVersion ${{ steps.get_version.outputs.VERSION }} `
          --packDir ./publish `
          --mainExe Storyboard.exe `
          --outputDir ./releases `
          --icon ./App/Assets/icon.ico

        echo "打包完成，文件列表："
        Get-ChildItem ./releases
      shell: pwsh

    - name: Generate Release Notes
      id: release_notes
      run: |
        $version = "${{ steps.get_version.outputs.VERSION }}"
        $notes = @"
        ## 🎉 分镜大师 v$version

        ### 📦 下载方式

        #### 国内用户（推荐）
        从 Gitee 下载，速度更快：
        - 访问 [Gitee Release](https://gitee.com/nan1314/Storyboard/releases/tag/v$version)

        #### 国外用户
        从 GitHub 下载（本页面）

        ### 📥 安装说明

        1. 下载 \`StoryboardSetup.exe\`
        2. 运行安装程序
        3. 安装后支持自动更新功能

        ### 🔄 自动更新

        - ✅ 国内用户优先使用 Gitee 更新源
        - ✅ 国外用户自动使用 GitHub 更新源
        - ✅ 智能切换，确保更新成功

        ### 📝 更新内容

        <!-- 请在此处添加更新日志 -->

        ---

        **注意**: 首次安装需要 .NET 8 Desktop Runtime，安装程序会自动提示下载。

        **技术支持**: 微信 zxxl2025
        "@

        # 保存到文件
        $notes | Out-File -FilePath release_notes.md -Encoding utf8

        # 输出到 GitHub Actions
        echo "RELEASE_NOTES<<EOF" >> $env:GITHUB_OUTPUT
        echo $notes >> $env:GITHUB_OUTPUT
        echo "EOF" >> $env:GITHUB_OUTPUT
      shell: pwsh

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: ./releases/*
        draft: false
        prerelease: false
        body_path: release_notes.md
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: release-files-${{ steps.get_version.outputs.VERSION }}
        path: ./releases/*
        retention-days: 30

    - name: Post-release notification
      run: |
        echo "✅ GitHub Release 创建成功！"
        echo ""
        echo "📦 Release 地址: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
        echo ""
        echo "⚠️ 下一步：手动同步到 Gitee"
        echo "1. 访问: https://gitee.com/nan1314/Storyboard/releases/new"
        echo "2. 标签名称: ${{ github.ref_name }}"
        echo "3. 上传 releases 目录中的所有文件"
        echo "4. 点击'发布'"
        echo ""
        echo "💡 提示：可以使用 PowerShell 脚本自动下载并提示上传"
        echo "   运行: .\scripts\quick-release.ps1 -Version ${{ steps.get_version.outputs.VERSION }}"
      shell: pwsh
